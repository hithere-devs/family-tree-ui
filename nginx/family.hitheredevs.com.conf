server {
    listen 80;
    listen [::]:80;
    server_name family.hitheredevs.com;

    location /.well-known/acme-challenge/ {
        root /var/www/family-tree-ui;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name family.hitheredevs.com;

    ssl_certificate /etc/letsencrypt/live/family.hitheredevs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/family.hitheredevs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/family-tree-ui;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
